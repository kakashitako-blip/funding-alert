name: Funding Rate Monitor

on:
  schedule:
    - cron: '*/20 * * * *'   # frequent restart attempts; concurrency keeps one job running
  workflow_dispatch:

# Only one monitor job runs at a time. New scheduled triggers queue and start
# immediately after the current ~5.8h job ends → continuous 15-min scanning.
concurrency:
  group: funding-monitor
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # ~5h50m, under GitHub's 6h job cap
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests playwright
          python -m playwright install chromium --with-deps

      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: funding-state-${{ github.run_id }}
          restore-keys: funding-state-

      - name: Run monitor (looping)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python monitor.py --loop

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: funding-state-${{ github.run_id }}
